<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Split Charts Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        h1 { text-align: center; color: #00adb5; margin-bottom: 5px; }
        .broker-status { text-align: center; font-size: 13px; color: #ff4a4a; margin-bottom: 25px; transition: 0.3s; }
        .status-connected { color: #00adb5; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; border: 1px solid #2d2d2d; }
        .card h3 { margin: 0 0 10px 0; font-size: 14px; color: #888; text-transform: uppercase; }
        .card .value { font-size: 32px; font-weight: bold; color: #00adb5; }
        .card .unit { font-size: 18px; color: #888; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .btn-card { background: #1e1e1e; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d2d; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #00adb5; }
        input:checked + .slider:before { transform: translateX(24px); }
        .master-card { background: #252a34; border: 1px solid #00adb5; margin-bottom: 20px; }
        .status-indicator { display: inline-block; width: 14px; height: 14px; border-radius: 50%; background: #444; margin-right: 8px; }
        .status-on { background: #00adb5; box-shadow: 0 0 8px #00adb5; }
        
        /* LAYOUT BARU: Pembagian Grid Grafik Kanan - Kiri */
        .charts-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-bottom: 30px; width: 100%; }
        .chart-card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #2d2d2d; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .chart-container { position: relative; width: 100%; height: 280px; margin-top: 10px; }

        /* Media query untuk mematikan mode kanan-kiri jika resolusi layar terlalu kecil (HP) */
        @media (max-width: 500px) {
            .charts-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SMART HOME DASHBOARD</h1>
        <div id="broker-status" class="broker-status">Menghubungkan ke Cloud Broker...</div>
        
        <div class="card master-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin:0; color:#fff; font-size: 20px;">Sistem Utama</h2>
                <label class="switch">
                    <input type="checkbox" id="system" onclick="sendCmd('system', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="grid">
            <div class="card"><h3>Suhu</h3><div class="value"><span id="temp">0.0</span><span class="unit"> °C</span></div></div>
            <div class="card"><h3>Kelembaban</h3><div class="value"><span id="hum">0.0</span><span class="unit"> %</span></div></div>
            <div class="card">
                <h3>Status Kipas</h3>
                <div class="value" style="display:flex; align-items:center; justify-content:center; margin-top:5px;">
                    <span id="fan-dot" class="status-indicator"></span>
                    <span id="fan-text" style="font-size:24px;">OFF</span>
                </div>
            </div>
        </div>

        <div class="btn-grid">
            <div class="btn-card"><span>LED 1 (Tamu)</span><label class="switch"><input type="checkbox" id="led1" onclick="sendCmd('led1', this.checked)"><span class="slider"></span></label></div>
            <div class="btn-card"><span>LED 2 (Makan)</span><label class="switch"><input type="checkbox" id="led2" onclick="sendCmd('led2', this.checked)"><span class="slider"></span></label></div>
            <div class="btn-card"><span>LED 3 (Kamar 1)</span><label class="switch"><input type="checkbox" id="led3" onclick="sendCmd('led3', this.checked)"><span class="slider"></span></label></div>
            <div class="btn-card"><span>LED 4 (Kamar 2)</span><label class="switch"><input type="checkbox" id="led4" onclick="sendCmd('led4', this.checked)"><span class="slider"></span></label></div>
        </div>

        <div class="charts-layout">
            <div class="chart-card">
                <div class="chart-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-container">
                    <canvas id="humChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TOPIC_PREFIX = "smarthome_salman_c6_9f2a4b/";
        const brokerUrl = "wss://broker.hivemq.com:8884/mqtt";
        const options = {
            connectTimeout: 4000,
            clientId: 'WebDashboard_' + Math.random().toString(16).substr(2, 8),
            keepalive: 60,
            clean: true
        };

        const client = mqtt.connect(brokerUrl, options);
        let latestTemp = null;
        let latestHum = null;

        // Inisialisasi Grafik Suhu (Kiri)
        const ctxTemp = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(ctxTemp, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Suhu (°C)', data: [], borderColor: '#00adb5', backgroundColor: 'rgba(0, 173, 181, 0.1)', borderWidth: 2, tension: 0.3, pointRadius: 2 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false }, ticks: { color: '#888' } }, y: { grid: { display: false }, ticks: { color: '#00adb5' } } }, plugins: { legend: { labels: { color: '#e0e0e0' } } } }
        });

        // Inisialisasi Grafik Kelembaban (Kanan)
        const ctxHum = document.getElementById('humChart').getContext('2d');
        const humChart = new Chart(ctxHum, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Kelembaban (%)', data: [], borderColor: '#ffabe1', backgroundColor: 'rgba(255, 171, 225, 0.1)', borderWidth: 2, tension: 0.3, pointRadius: 2 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false }, ticks: { color: '#888' } }, y: { grid: { display: false }, ticks: { color: '#ffabe1' } } }, plugins: { legend: { labels: { color: '#e0e0e0' } } } }
        });

        client.on('connect', () => {
            document.getElementById('broker-status').innerText = "Terhubung ke Cloud Broker (Online)";
            document.getElementById('broker-status').className = "broker-status status-connected";
            client.subscribe(TOPIC_PREFIX + "+/state");
            client.subscribe(TOPIC_PREFIX + "telemetry/+");
        });

        client.on('offline', () => {
            document.getElementById('broker-status').innerText = "Koneksi Terputus dari Broker!";
            document.getElementById('broker-status').className = "broker-status";
        });

        client.on('message', (topic, payload) => {
            const message = payload.toString();
            const subTopic = topic.replace(TOPIC_PREFIX, "");

            if (subTopic === "telemetry/temp") {
                latestTemp = parseFloat(message);
                document.getElementById('temp').innerText = latestTemp.toFixed(1);
                pushDataToCharts(); 
            }
            else if (subTopic === "telemetry/humidity") {
                latestHum = parseFloat(message);
                document.getElementById('hum').innerText = latestHum.toFixed(1);
            }
            else if (subTopic === "system/state") document.getElementById('system').checked = (message === "1");
            else if (subTopic === "led1/state") document.getElementById('led1').checked = (message === "1");
            else if (subTopic === "led2/state") document.getElementById('led2').checked = (message === "1");
            else if (subTopic === "led3/state") document.getElementById('led3').checked = (message === "1");
            else if (subTopic === "led4/state") document.getElementById('led4').checked = (message === "1");
            else if (subTopic === "telemetry/fan") {
                if (message === "1") {
                    document.getElementById('fan-dot').className = "status-indicator status-on";
                    document.getElementById('fan-text').innerText = "ON";
                } else {
                    document.getElementById('fan-dot').className = "status-indicator";
                    document.getElementById('fan-text').innerText = "OFF";
                }
            }
        });

        function pushDataToCharts() {
            if (latestTemp !== null && latestHum !== null) {
                const timeNow = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                // Plot ke Grafik Suhu
                tempChart.data.labels.push(timeNow);
                tempChart.data.datasets[0].data.push(latestTemp);
                
                // Plot ke Grafik Kelembaban
                humChart.data.labels.push(timeNow);
                humChart.data.datasets[0].data.push(latestHum);
                
                // Shift buffer (Max 20 data points)
                if (tempChart.data.labels.length > 20) {
                    tempChart.data.labels.shift(); tempChart.data.datasets[0].data.shift();
                    humChart.data.labels.shift(); humChart.data.datasets[0].data.shift();
                }
                tempChart.update();
                humChart.update();
            }
        }

        function sendCmd(device, isChecked) {
            const valStr = isChecked ? "1" : "0";
            client.publish(`${TOPIC_PREFIX}${device}/cmd`, valStr, { qos: 0, retain: false });
        }
    </script>
</body>
</html>
